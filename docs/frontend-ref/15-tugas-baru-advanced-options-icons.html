<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tugas Baru - Gamatutor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Hide scrollbar for clean mobile UI but keep functionality */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Details/Summary cleanup */
    details > summary {
      list-style: none;
    }
    details > summary::-webkit-details-marker {
      display: none;
    }
  </style>
</head>
<body class="bg-gray-50 antialiased text-gray-900">

  <!-- Root Mobile Container -->
  <div class="w-full h-screen flex flex-col mx-auto bg-gray-50 relative overflow-hidden">
    
    <!-- Header -->
    <header class="shrink-0 pt-10 pb-3 px-4 flex items-center justify-between bg-gray-50/90 backdrop-blur-md z-20 sticky top-0 border-b border-gray-200/60">
      <button id="btn-back" class="w-10 h-10 flex items-center justify-center -ml-2 rounded-full active:bg-gray-200 transition-colors text-gray-700">
        <iconify-icon icon="lucide:arrow-left" class="text-2xl"></iconify-icon>
      </button>
      
      <h1 class="text-[17px] font-bold tracking-tight text-gray-900">Tugas Baru</h1>
      
      <button id="btn-save" disabled class="text-primary-600 font-semibold px-2 disabled:text-gray-400 disabled:font-medium transition-colors">
        Simpan
      </button>
    </header>

    <!-- Main Scrollable Form Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-6 pb-28 relative">
      <form class="flex flex-col gap-6">
        
        <!-- 1. Mata Kuliah -->
        <div class="flex flex-col gap-2">
          <label for="course" class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:book-open" class="text-[18px] text-blue-500"></iconify-icon> Mata Kuliah <span class="text-red-500">*</span>
          </label>
          
          <div class="relative">
            <input type="text" id="course" placeholder="Ketik atau pilih mata kuliah..." 
              class="w-full pl-4 pr-11 py-3.5 rounded-xl border border-gray-200 bg-white text-[15px] placeholder:text-gray-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-50 outline-none transition-all shadow-sm">
            <iconify-icon icon="lucide:search" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></iconify-icon>
          </div>
          
          <div class="flex flex-wrap gap-2 mt-1">
            <button type="button" id="chip-course-1" class="px-3.5 py-1.5 rounded-lg border border-gray-200 text-[12px] font-medium text-gray-700 bg-white shadow-sm active:bg-gray-50 transition-colors">Algoritma</button>
            <button type="button" id="chip-course-2" class="px-3.5 py-1.5 rounded-lg border border-gray-200 text-[12px] font-medium text-gray-700 bg-white shadow-sm active:bg-gray-50 transition-colors">Basis Data</button>
            <button type="button" id="chip-course-3" class="px-3.5 py-1.5 rounded-lg border border-gray-200 text-[12px] font-medium text-gray-700 bg-white shadow-sm active:bg-gray-50 transition-colors">Kalkulus</button>
          </div>
        </div>

        <!-- 2. Nama Tugas -->
        <div class="flex flex-col gap-2">
          <label for="task_name" class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:target" class="text-[18px] text-amber-500"></iconify-icon> Nama Tugas <span class="text-red-500">*</span>
          </label>
          <input type="text" id="task_name" placeholder="Apa yang mau dikerjakan?" 
            class="w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white text-[15px] placeholder:text-gray-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-50 outline-none transition-all shadow-sm">
        </div>

        <!-- 3. Deskripsi -->
        <div class="flex flex-col gap-2">
          <label for="description" class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:align-left" class="text-[18px] text-gray-500"></iconify-icon> Deskripsi
          </label>
          <textarea id="description" rows="2" placeholder="Deskripsi tambahan (opsional)..." 
            class="w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white text-[15px] placeholder:text-gray-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-50 outline-none transition-all resize-none shadow-sm"></textarea>
        </div>

        <!-- 4. Strategi Belajar -->
        <div class="flex flex-col gap-2">
          <label class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:brain" class="text-[18px] text-purple-500"></iconify-icon> Strategi Belajar <span class="text-red-500">*</span>
          </label>
          
          <div class="grid grid-cols-2 gap-3">
            <!-- Video -->
            <button type="button" id="strategy-video" class="flex items-center justify-center gap-2 p-3.5 rounded-xl border border-gray-200 bg-white text-gray-700 active:bg-gray-50 transition-all shadow-sm">
              <iconify-icon icon="lucide:video" class="text-xl text-gray-500"></iconify-icon>
              <span class="text-[13px] font-medium">Video</span>
            </button>
            
            <!-- Latihan (Selected State) -->
            <button type="button" id="strategy-latihan" class="flex items-center justify-center gap-2 p-3.5 rounded-xl border-2 border-primary-500 bg-primary-50 text-primary-700 relative transition-all shadow-sm">
              <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-primary-500 rounded-full flex items-center justify-center text-white shadow-sm">
                <iconify-icon icon="lucide:check" class="text-[10px]"></iconify-icon>
              </div>
              <iconify-icon icon="lucide:pencil" class="text-xl text-primary-600"></iconify-icon>
              <span class="text-[13px] font-medium">Latihan</span>
            </button>
            
            <!-- Baca -->
            <button type="button" id="strategy-baca" class="flex items-center justify-center gap-2 p-3.5 rounded-xl border border-gray-200 bg-white text-gray-700 active:bg-gray-50 transition-all shadow-sm">
              <iconify-icon icon="lucide:book-open-text" class="text-xl text-gray-500"></iconify-icon>
              <span class="text-[13px] font-medium">Baca</span>
            </button>
            
            <!-- Diskusi -->
            <button type="button" id="strategy-diskusi" class="flex items-center justify-center gap-2 p-3.5 rounded-xl border border-gray-200 bg-white text-gray-700 active:bg-gray-50 transition-all shadow-sm">
              <iconify-icon icon="lucide:users" class="text-xl text-gray-500"></iconify-icon>
              <span class="text-[13px] font-medium">Diskusi</span>
            </button>
          </div>
        </div>

        <!-- 5. Tujuan Task -->
        <div class="flex flex-col gap-2">
          <label for="goal" class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:lightbulb" class="text-[18px] text-amber-500"></iconify-icon> Tujuan Task
          </label>
          
          <input type="text" id="goal" placeholder="Tulis tujuanmu..." 
            class="w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-white text-[15px] placeholder:text-gray-400 focus:border-primary-500 focus:ring-4 focus:ring-primary-50 outline-none transition-all shadow-sm">
          
          <div class="mt-1 flex flex-wrap gap-2">
            <button type="button" id="chip-goal-1" class="px-3 py-1.5 rounded-lg bg-white border border-pink-200 text-[12px] font-medium text-pink-700 shadow-sm active:bg-pink-50 transition-colors">Memahami konsep</button>
            <button type="button" id="chip-goal-2" class="px-3 py-1.5 rounded-lg bg-white border border-indigo-200 text-[12px] font-medium text-indigo-700 shadow-sm active:bg-indigo-50 transition-colors">Persiapan UTS</button>
            <button type="button" id="chip-goal-3" class="px-3 py-1.5 rounded-lg bg-white border border-teal-200 text-[12px] font-medium text-teal-700 shadow-sm active:bg-teal-50 transition-colors">Latihan mandiri</button>
          </div>
        </div>

        <!-- 6. Prioritas -->
        <div class="flex flex-col gap-2">
          <label class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:zap" class="text-[18px] text-gray-500"></iconify-icon> Prioritas <span class="text-red-500">*</span>
          </label>
          
          <div class="flex gap-2">
            <!-- Low -->
            <button type="button" id="priority-low" class="flex-1 py-3.5 rounded-xl border border-gray-200 bg-white flex flex-col items-center justify-center gap-1 active:bg-gray-50 transition-all text-gray-600 shadow-sm">
              <span class="text-[13px] font-medium">Rendah</span>
            </button>
            
            <!-- Medium (Selected) -->
            <button type="button" id="priority-medium" class="flex-1 py-3.5 rounded-xl border-2 border-primary-500 bg-primary-50 flex flex-col items-center justify-center gap-1 relative transition-all text-primary-700 shadow-sm">
              <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-primary-500 rounded-full flex items-center justify-center text-white shadow-sm">
                <iconify-icon icon="lucide:check" class="text-[10px]"></iconify-icon>
              </div>
              <span class="text-[13px] font-medium">Sedang</span>
            </button>
            
            <!-- High -->
            <button type="button" id="priority-high" class="flex-1 py-3.5 rounded-xl border border-gray-200 bg-white flex flex-col items-center justify-center gap-1 active:bg-gray-50 transition-all text-gray-600 shadow-sm">
              <span class="text-[13px] font-medium">Tinggi</span>
            </button>
          </div>
        </div>

        <!-- 7. Deadline -->
        <div class="flex flex-col gap-2">
          <label class="text-[14px] font-semibold text-gray-900 flex items-center gap-2">
            <iconify-icon icon="lucide:calendar" class="text-[18px] text-teal-500"></iconify-icon> Deadline Target
          </label>
          
          <div class="grid grid-cols-2 gap-3">
            <button type="button" id="btn-date" class="flex items-center gap-3 px-4 py-3.5 rounded-xl border border-gray-200 bg-white active:bg-gray-50 shadow-sm transition-colors text-left">
              <iconify-icon icon="lucide:calendar" class="text-xl text-gray-400"></iconify-icon>
              <span class="text-[14px] font-medium text-gray-600">Pilih tgl</span>
            </button>
            <button type="button" id="btn-time" class="flex items-center gap-3 px-4 py-3.5 rounded-xl border border-gray-200 bg-white active:bg-gray-50 shadow-sm transition-colors text-left">
              <iconify-icon icon="lucide:clock" class="text-xl text-gray-400"></iconify-icon>
              <span class="text-[14px] font-medium text-gray-600">Pilih jam</span>
            </button>
          </div>
        </div>

        <!-- EXPANDABLE SECTION: Opsi Lanjutan -->
        <div class="bg-white border-y border-gray-100 -mx-5 px-5 py-6 mb-4">
          <button type="button" id="btn-toggle-advanced" class="w-full flex items-center justify-between group">
            <div class="flex items-center gap-2">
              <iconify-icon icon="lucide:settings-2" class="text-[18px] text-gray-500"></iconify-icon>
              <span class="text-[15px] font-semibold text-gray-900">Opsi Lanjutan</span>
            </div>
            <iconify-icon icon="lucide:chevron-down" id="advanced-chevron" class="text-xl text-gray-400 transition-transform duration-300"></iconify-icon>
          </button>
          
          <div id="advanced-content" class="mt-7 space-y-8 hidden">
            
            <!-- Tingkat Kesulitan -->
            <div class="space-y-3">
              <label class="flex items-center gap-1.5 text-[11px] font-bold text-gray-400 tracking-wider uppercase">
                <iconify-icon icon="lucide:bar-chart-2" class="text-sm"></iconify-icon>
                Tingkat Kesulitan
              </label>
              <div class="grid grid-cols-3 gap-3">
                <button type="button" id="diff-easy" class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl border border-gray-200 bg-white transition-all">
                  <iconify-icon icon="lucide:leaf" class="text-2xl text-emerald-500"></iconify-icon>
                  <span class="text-[13px] font-medium text-gray-600">Mudah</span>
                </button>
                <button type="button" id="diff-medium" class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl border-2 border-amber-500 bg-amber-50 transition-all relative">
                  <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-amber-500 rounded-full flex items-center justify-center text-white">
                    <iconify-icon icon="lucide:check" class="text-[10px]"></iconify-icon>
                  </div>
                  <iconify-icon icon="lucide:flame" class="text-2xl text-amber-500"></iconify-icon>
                  <span class="text-[13px] font-semibold text-amber-700">Sedang</span>
                </button>
                <button type="button" id="diff-hard" class="flex flex-col items-center justify-center gap-2 py-4 rounded-xl border border-gray-200 bg-white transition-all">
                  <iconify-icon icon="lucide:mountain" class="text-2xl text-red-500"></iconify-icon>
                  <span class="text-[13px] font-medium text-gray-600">Sulit</span>
                </button>
              </div>
            </div>

            <!-- Tracking Evaluasi -->
            <div class="space-y-3">
              <label class="flex items-center gap-1.5 text-[11px] font-bold text-gray-400 tracking-wider uppercase">
                <iconify-icon icon="lucide:line-chart" class="text-sm"></iconify-icon>
                Tracking Evaluasi
              </label>
              <div class="p-4 rounded-xl border border-gray-200 bg-white">
                <div class="flex items-center justify-between">
                  <div>
                    <p class="text-[14px] font-medium text-gray-900">Track Nilai</p>
                    <p class="text-[12px] text-gray-500 mt-0.5">Pantau progress pre/post test</p>
                  </div>
                  <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="track_nilai_toggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-600"></div>
                  </label>
                </div>
                
                <div id="pre_test_field" class="hidden mt-4 pt-4 border-t border-gray-100">
                  <label class="text-[12px] font-medium text-gray-600 mb-2 block">Nilai Pre-test (Opsional)</label>
                  <div class="relative">
                    <input type="number" placeholder="0" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-primary-500 focus:ring-4 focus:ring-primary-50 outline-none text-[14px] transition-all">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-[14px] font-medium">%</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Subtasks -->
            <div class="space-y-3">
              <label class="flex items-center gap-1.5 text-[11px] font-bold text-gray-400 tracking-wider uppercase">
                <iconify-icon icon="lucide:check-square" class="text-sm"></iconify-icon>
                Subtasks
              </label>
              <div class="space-y-3">
                <div class="flex items-center gap-3 pl-2 pr-3 py-2 rounded-xl border border-gray-200 bg-white focus-within:border-primary-500 focus-within:ring-4 focus-within:ring-primary-50 transition-all group">
                  <button type="button" class="text-gray-400 cursor-grab active:cursor-grabbing hover:text-gray-600 transition-colors shrink-0 flex items-center justify-center w-8 h-8">
                    <iconify-icon icon="lucide:grip-vertical" class="text-xl"></iconify-icon>
                  </button>
                  <div class="w-5 h-5 rounded border border-gray-300 flex items-center justify-center shrink-0"></div>
                  <input type="text" value="Review materi bab 1" class="flex-1 text-[14px] py-1.5 outline-none text-gray-900 bg-transparent min-w-0">
                  <button type="button" id="btn-del-subtask" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors shrink-0">
                    <iconify-icon icon="lucide:x" class="text-xl"></iconify-icon>
                  </button>
                </div>
                
                <button type="button" id="btn-add-subtask" class="w-full py-3.5 rounded-xl border border-dashed border-gray-300 text-[14px] font-medium text-gray-600 hover:text-primary-600 hover:border-primary-300 hover:bg-primary-50 transition-all flex items-center justify-center gap-2">
                  <iconify-icon icon="lucide:plus" class="text-lg"></iconify-icon>
                  Tambah Subtask
                </button>
              </div>
            </div>

            <!-- Links -->
            <div class="space-y-3">
              <label class="flex items-center gap-1.5 text-[11px] font-bold text-gray-400 tracking-wider uppercase">
                <iconify-icon icon="lucide:link" class="text-sm"></iconify-icon>
                Links
              </label>
              <div class="space-y-3">
                <div class="flex items-center gap-3 p-3 rounded-xl border border-gray-200 bg-white">
                  <div class="w-10 h-10 rounded-lg bg-red-50 flex items-center justify-center text-red-500 shrink-0">
                    <iconify-icon icon="lucide:youtube" class="text-xl"></iconify-icon>
                  </div>
                  <div class="flex-1 overflow-hidden">
                    <p class="text-[14px] font-medium text-gray-900 truncate">Tutorial Algoritma Dasar</p>
                    <p class="text-[12px] text-gray-500 truncate mt-0.5">youtube.com/watch?v=123</p>
                  </div>
                  <button type="button" id="btn-del-link" class="w-10 h-10 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors shrink-0">
                    <iconify-icon icon="lucide:trash-2" class="text-lg"></iconify-icon>
                  </button>
                </div>
                
                <button type="button" id="btn-add-link" class="w-full py-3.5 rounded-xl border border-dashed border-gray-300 text-[14px] font-medium text-gray-600 hover:text-primary-600 hover:border-primary-300 hover:bg-primary-50 transition-all flex items-center justify-center gap-2">
                  <iconify-icon icon="lucide:plus" class="text-lg"></iconify-icon>
                  Tambah Link
                </button>
              </div>
            </div>

          </div>
        </div>

      </form>
    </main>
  </div>

  <script>
    // Interactive toggle for Track Nilai field
    const trackNilaiToggle = document.getElementById('track_nilai_toggle');
    if(trackNilaiToggle) {
      trackNilaiToggle.addEventListener('change', function(e) {
        const conditionalField = document.getElementById('pre_test_field');
        if(e.target.checked) {
          conditionalField.classList.remove('hidden');
        } else {
          conditionalField.classList.add('hidden');
        }
      });
    }

    // Toggle Advanced Options
    const btnToggleAdvanced = document.getElementById('btn-toggle-advanced');
    if(btnToggleAdvanced) {
      btnToggleAdvanced.addEventListener('click', function() {
        const content = document.getElementById('advanced-content');
        const chevron = document.getElementById('advanced-chevron');
        content.classList.toggle('hidden');
        chevron.classList.toggle('rotate-180');
      });
    }
  </script>
</body>
</html>
