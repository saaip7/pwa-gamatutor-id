        body {
            -webkit-tap-highlight-color: transparent;

        /* View Transitions */
        html {
            background-color: #ffffff;
        }
        @view-transition {
            navigation: auto;
        }
        ::view-transition-old(main-content) {
            animation: 0.25s ease-out both fade-out;
        }
        ::view-transition-new(main-content) {
            animation: 0.25s ease-in 0.1s both fade-in;
        }
        @keyframes fade-out {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-8px); }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Utilities */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Premium Card Styles */
        .spotlight-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            box-shadow: 0 2px 10px -2px rgba(0, 0, 0, 0.05), 0 0 1px rgba(0,0,0,0.1) inset;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .spotlight-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -6px rgba(0, 0, 0, 0.08), 0 0 1px rgba(0,0,0,0.1) inset;
        }
        .spotlight-card:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.06), 0 0 1px rgba(0,0,0,0.1) inset;
        }

        /* Badge States */
        .badge-svg-container {
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
        }
        .spotlight-card:hover .badge-svg-container {
            transform: scale(1.08) translateY(-2px);
            filter: drop-shadow(0 12px 16px rgba(0,0,0,0.2));
        }

        .badge-locked .badge-svg-container {
            filter: grayscale(1) sepia(0.1) hue-rotate(200deg) brightness(0.65) contrast(1.3) drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            opacity: 0.85;
        }
        .spotlight-card:hover .badge-locked .badge-svg-container {
            transform: scale(1.02);
            filter: grayscale(1) sepia(0.1) hue-rotate(200deg) brightness(0.7) contrast(1.3) drop-shadow(0 6px 10px rgba(0,0,0,0.15));
        }

        .icon-glow {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Particle System */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg) translateX(20px); opacity: 0; }
        }
        .particle {
            position: absolute;
            top: -10%;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
            color: #FCD34D;
        }
        .particle-blur {
            position: absolute;
            top: -10%;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 0;
            background: #F59E0B;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px #F59E0B;
        }
