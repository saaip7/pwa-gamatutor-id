<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamatutor - Forgiving Streak Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#3B82F6',
                        },
                        amber: {
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                        },
                        emerald: {
                            100: '#D1FAE5',
                            500: '#10B981',
                        },
                        blue: {
                            50: '#EFF6FF',
                            100: '#DBEAFE',
                            500: '#3B82F6',
                            600: '#2563EB',
                        },
                        gray: {
                            50: '#F9FAFB',
                            100: '#F3F4F6',
                            200: '#E5E7EB',
                            300: '#D1D5DB',
                            400: '#9CA3AF',
                            500: '#6B7280',
                            600: '#4B5563',
                            700: '#374151',
                            800: '#1F2937',
                            900: '#111827',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #F9FAFB;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        @keyframes flameFlicker {
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            25% { transform: rotate(-3deg) scale(1.05); opacity: 0.9; }
            50% { transform: rotate(2deg) scale(0.95); opacity: 1; }
            75% { transform: rotate(-1deg) scale(1.02); opacity: 0.85; }
            100% { transform: rotate(0deg) scale(1); opacity: 1; }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .animate-pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        .animate-flame {
            animation: flameFlicker 2.5s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        /* Hide scrollbar for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none; 
            scrollbar-width: none;  
        }
    </style>
</head>
<body>
    <!-- Main Screen Container -->
    <div class="w-full h-screen bg-gray-50 flex flex-col relative font-sans overflow-hidden">

        <!-- Full Screen Layout wrapper -->
        <div class="bg-white w-full h-full relative flex flex-col overflow-y-auto max-w-md mx-auto shadow-[0_0_40px_rgba(0,0,0,0.03)] no-scrollbar">
            
            <!-- Close Button -->
            <button class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-gray-50 hover:bg-gray-100 active:bg-gray-200 rounded-full text-gray-500 transition-colors shrink-0 z-30">
                <iconify-icon icon="lucide:x" class="text-[22px]"></iconify-icon>
            </button>

            <!-- Scrollable Content Area -->
            <div class="flex-1 flex flex-col justify-center px-6 py-10">
                
                <!-- Hero Section -->
                <div class="text-center mb-12">
                    <!-- Flame Visual -->
                    <div class="relative inline-flex flex-col items-center justify-center mb-6">
                        <div class="relative w-32 h-32 flex items-center justify-center">
                            <!-- Glow Effect -->
                            <div class="absolute inset-0 bg-amber-400 rounded-full blur-[28px] opacity-30 animate-pulse-glow"></div>
                            <!-- Flame Icon with new Flammy animation -->
                            <iconify-icon icon="lucide:flame" class="text-amber-500 text-[100px] drop-shadow-xl relative z-10 animate-flame"></iconify-icon>
                        </div>
                        <!-- Streak Number Pill -->
                        <div class="bg-white px-6 py-2 rounded-full border border-amber-100 shadow-[0_4px_16px_rgba(245,158,11,0.15)] relative z-20 -mt-6 flex items-center gap-1.5">
                            <span class="text-[26px] font-extrabold text-amber-600 leading-none tracking-tight">7</span>
                            <span class="text-[14px] font-bold text-amber-600/80 uppercase tracking-widest leading-none mt-0.5">Hari</span>
                        </div>
                    </div>

                    <h2 class="text-[24px] font-bold text-gray-900 mb-2.5 tracking-tight">Konsistensi Kamu</h2>
                    <p class="text-[15px] text-gray-500 px-4 leading-relaxed">Luar biasa! Kamu telah aktif belajar selama 7 hari berturut-turut.</p>
                </div>

                <!-- Mini Calendar (7 Days) -->
                <div class="mb-12">
                    <div class="flex justify-between items-center px-1">
                        <!-- Day 1: Completed -->
                        <div class="flex flex-col items-center gap-2.5">
                            <div class="w-[42px] h-[42px] rounded-full bg-emerald-100 text-emerald-500 flex items-center justify-center shadow-sm border border-emerald-100/50">
                                <iconify-icon icon="lucide:check" class="text-[20px] stroke-[2.5px]"></iconify-icon>
                            </div>
                            <span class="text-[12px] font-semibold text-gray-500">Sen</span>
                        </div>

                        <!-- Day 2: Completed -->
                        <div class="flex flex-col items-center gap-2.5">
                            <div class="w-[42px] h-[42px] rounded-full bg-emerald-100 text-emerald-500 flex items-center justify-center shadow-sm border border-emerald-100/50">
                                <iconify-icon icon="lucide:check" class="text-[20px] stroke-[2.5px]"></iconify-icon>
                            </div>
                            <span class="text-[12px] font-semibold text-gray-500">Sel</span>
                        </div>

                        <!-- Day 3: Freeze Used -->
                        <div class="flex flex-col items-center gap-2.5">
                            <div class="w-[42px] h-[42px] rounded-full bg-blue-100 text-blue-500 flex items-center justify-center shadow-sm border border-blue-200 relative">
                                <iconify-icon icon="lucide:snowflake" class="text-[20px]"></iconify-icon>
                                <!-- Small tooltip indicator dot -->
                                <div class="absolute -top-1 -right-1 w-3 h-3 bg-white rounded-full flex items-center justify-center">
                                    <div class="w-1.5 h-1.5 bg-blue-400 rounded-full"></div>
                                </div>
                            </div>
                            <span class="text-[12px] font-semibold text-blue-600">Rab</span>
                        </div>

                        <!-- Day 4: Completed -->
                        <div class="flex flex-col items-center gap-2.5">
                            <div class="w-[42px] h-[42px] rounded-full bg-emerald-100 text-emerald-500 flex items-center justify-center shadow-sm border border-emerald-100/50">
                                <iconify-icon icon="lucide:check" class="text-[20px] stroke-[2.5px]"></iconify-icon>
                            </div>
                            <span class="text-[12px] font-semibold text-gray-500">Kam</span>
                        </div>

                        <!-- Day 5: Today / Pending -->
                        <div class="flex flex-col items-center gap-2.5 relative">
                            <!-- Today indicator -->
                            <div class="absolute -top-6 text-[10px] font-bold text-amber-500 bg-amber-50 px-2 py-0.5 rounded-md">Hari ini</div>
                            <div class="w-[42px] h-[42px] rounded-full bg-gray-50 text-gray-300 flex items-center justify-center border-2 border-dashed border-gray-200 shadow-sm">
                                <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                            </div>
                            <span class="text-[12px] font-bold text-gray-900">Jum</span>
                        </div>

                        <!-- Day 6: Future -->
                        <div class="flex flex-col items-center gap-2.5 opacity-60">
                            <div class="w-[42px] h-[42px] rounded-full bg-gray-50 flex items-center justify-center border border-gray-100">
                            </div>
                            <span class="text-[12px] font-medium text-gray-400">Sab</span>
                        </div>

                        <!-- Day 7: Future -->
                        <div class="flex flex-col items-center gap-2.5 opacity-60">
                            <div class="w-[42px] h-[42px] rounded-full bg-gray-50 flex items-center justify-center border border-gray-100">
                            </div>
                            <span class="text-[12px] font-medium text-gray-400">Min</span>
                        </div>
                    </div>
                </div>

                <!-- Simplified Forgiving Mechanism (Streak Freeze) -->
                <div class="mt-4">
                    <div class="bg-white border border-gray-200 rounded-[16px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.02)] flex flex-col gap-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center shrink-0 border border-blue-100/50">
                                    <iconify-icon icon="lucide:shield-check" class="text-[18px]"></iconify-icon>
                                </div>
                                <h3 class="text-[15px] font-bold text-gray-900 leading-tight">Pelindung Streak</h3>
                            </div>
                            
                            <!-- Badge styled availability -->
                            <div class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg flex items-center justify-center min-w-[36px]">
                                <span class="text-[13px] font-bold leading-none">1</span>
                            </div>
                        </div>
                        
                        <button class="w-full h-10 bg-white border border-gray-200 shadow-sm text-[14px] font-semibold text-gray-700 rounded-xl hover:bg-gray-50 hover:border-gray-300 active:bg-gray-100 transition-all flex items-center justify-center gap-2">
                            <iconify-icon icon="lucide:snowflake" class="text-[16px] text-gray-400"></iconify-icon>
                            Gunakan Hari Ini
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
