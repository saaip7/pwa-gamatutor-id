<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gamatutor - Splash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#3B82F6',
                        },
                        gray: {
                            50: '#F8F9FA',
                            200: '#E5E7EB',
                            500: '#6B7280',
                            800: '#1F2937',
                        }
                    },
                    borderRadius: {
                        'xl': '12px',
                        '2xl': '16px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #FFFFFF;
        }
        
        /* Entrance Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        /* Icon Micro-animations */
        @keyframes floatPulse {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.05); }
        }
        .animate-float-pulse {
            animation: floatPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(59, 130, 246, 0.08); }
            50% { box-shadow: 0 8px 30px rgba(59, 130, 246, 0.2); }
        }
        .animate-glow-pulse {
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes iconBgGlow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.15); }
        }
        .animate-icon-bg-glow {
            animation: iconBgGlow 4s ease-in-out infinite;
        }

        /* Text Animations */
        @keyframes textScaleUp {
            from { opacity: 0; transform: translateY(16px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-text-stagger {
            opacity: 0;
            animation: textScaleUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes letterSpacingAnim {
            from { opacity: 0; transform: translateY(12px); letter-spacing: -0.05em; }
            to { opacity: 1; transform: translateY(0); letter-spacing: 0.025em; }
        }
        .animate-tagline {
            opacity: 0;
            animation: letterSpacingAnim 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Background Enhancements */
        @keyframes bgGlowMain {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        .animate-bg-glow-main {
            transform: translate(-50%, -50%);
            animation: bgGlowMain 4s ease-in-out infinite;
        }

        @keyframes bgGlowSec {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
        }
        .animate-bg-glow-sec {
            opacity: 0.3;
            transform: translate(-50%, -50%);
            animation: bgGlowSec 5s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        /* Loading Indicator */
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .animate-dot {
            opacity: 0.3;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        /* Page Exit Animations */
        @keyframes pageExitBg {
            to { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        @keyframes pageExitContent {
            to { opacity: 0; transform: translateY(8px); }
        }
        
        .page-exit .bg-glow-layer {
            animation: pageExitBg 0.6s ease-out forwards !important;
        }
        .page-exit .main-content-layer {
            animation: pageExitContent 0.6s ease-out forwards !important;
        }

        /* Accessibility: Prefers Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <!-- Main Screen Container -->
    <div id="splash-screen" class="w-full h-screen bg-white flex flex-col font-sans relative overflow-hidden">
        
        <!-- Subtle Background Glows (1% gaming vibe) -->
        <div class="absolute top-1/2 left-1/2 w-96 h-96 bg-primary/5 rounded-full blur-[60px] pointer-events-none z-0 bg-glow-layer animate-bg-glow-sec"></div>
        <div class="absolute top-1/2 left-1/2 w-72 h-72 bg-primary/5 rounded-full blur-3xl pointer-events-none z-0 bg-glow-layer animate-bg-glow-main"></div>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col items-center justify-center pt-14 pb-[34px] px-6 z-10 main-content-layer">
            
            <!-- Logo / Icon -->
            <div class="animate-fade-in-up flex flex-col items-center mb-6">
                <div class="relative w-20 h-20 animate-float-pulse">
                    <!-- Icon background glow -->
                    <div class="absolute inset-0 bg-primary/30 rounded-2xl blur-lg animate-icon-bg-glow -z-10"></div>
                    <!-- Icon Box -->
                    <div class="w-full h-full rounded-2xl bg-gray-50 border border-gray-200 text-primary flex items-center justify-center shadow-[0_4px_20px_rgba(59,130,246,0.08)] animate-glow-pulse z-10 relative">
                        <iconify-icon icon="lucide:target" class="text-[40px]"></iconify-icon>
                    </div>
                </div>
            </div>

            <!-- App Name -->
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight flex items-center justify-center">
                <span class="inline-block animate-text-stagger" style="animation-delay: 100ms">G</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 130ms">a</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 160ms">m</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 190ms">a</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 220ms">t</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 250ms">u</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 280ms">t</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 310ms">o</span>
                <span class="inline-block animate-text-stagger" style="animation-delay: 340ms">r</span>
            </h1>

            <!-- Tagline -->
            <p class="text-gray-500 mt-2 text-base font-medium animate-tagline tracking-wide" style="animation-delay: 200ms;">
                Master Your Study
            </p>

            <!-- Loading Dots -->
            <div class="flex items-center justify-center gap-1.5 mt-8 h-4 animate-fade-in-up" style="animation-delay: 400ms;">
                <div class="w-2 h-2 rounded-full bg-primary/40 animate-dot" style="animation-delay: 0ms;"></div>
                <div class="w-2 h-2 rounded-full bg-primary/60 animate-dot" style="animation-delay: 150ms;"></div>
                <div class="w-2 h-2 rounded-full bg-primary/80 animate-dot" style="animation-delay: 300ms;"></div>
            </div>

        </main>
    </div>

    <!-- Transition Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const splashScreen = document.getElementById('splash-screen');
            
            // Wait 2.5 seconds, then trigger the exit animation to simulate navigating to Login
            setTimeout(() => {
                splashScreen.classList.add('page-exit');
                
                // After the fade out completes (600ms), you would typically navigate
                // window.location.href = '/login';
                
                // For preview purposes, we log it
                setTimeout(() => {
                    console.log('Transition to Login screen initiated.');
                }, 600);
                
            }, 2500);
        });
    </script>
</body>
</html>
